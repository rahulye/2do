<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Do</title>
    <link rel="icon" href="./images/icon.jpg"> 
    <link rel="stylesheet" href="./style/general.css" type="Text/css">
    <link rel="stylesheet" href="./style/style.css" type="Text/css">
  </head>
  <body>
    <main>
      <div class="header-cont">
        <h1>To Do List </h1>
        <img class="to-do-image" src="./images/icon.jpg" alt="to do icon">
      </div>
      
      <div class="add-cont">
        <input class="input-txt js-input" placeholder="Add your Task" type="text">
        <button class="add-btn js-add">Add</button>
      </div>

      <ul class="unlist js-unlist">
      </ul>
    </main>
  </body>
  <script src="script.js"></script>
</html>
