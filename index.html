<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Do</title>
    <link rel="icon" href="./images/icon.jpg"> 
    <link rel="stylesheet" href="./style/general.css" type="Text/css">
    <link rel="stylesheet" href="./style/style.css" type="Text/css">
  </head>
  <body>
    <main>
      <div class="header-cont">
        <h1>To Do List </h1>
        <img class="to-do-image" src="./images/icon.jpg" alt="to do icon">
      </div>
      <div class="add-cont">
        <input class="input-txt" placeholder="Add your Task" type="text">
        <button class="add-btn">Add</button>
      </div>
      <div class="task-cont">
        <img class="checked-img" src="./images/checked.png" alt="checked">
        <p class="task-txt">Upload</p>
        <img class="unchecked-img" src="./images/unchecked.png" alt="unchecked">
        <img class="clear-img" src="./images/cancel.png" alt="clear">
      </div>
    </main>
  </body>
  <script src="script.js"></script>
</html>
